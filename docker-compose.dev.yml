# ============================================================
# Docker Compose - Ambiente de Desenvolvimento
# ============================================================
# Uso: docker-compose -f docker-compose.dev.yml up
#
# Diferencas do ambiente de producao:
# - Frontend e Backend usam volumes montados para hot-reload
# - Vite roda em modo dev (HMR) na porta 5173
# - Backend roda com nodemon para auto-restart
# - Nao eh necessario recompilar a imagem a cada mudanca
# ============================================================

services:
  database:
    image: mariadb:10.11
    container_name: tacacasas_db_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-taca_das_casas}
      MYSQL_USER: tacacasas_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-tacacasas_pwd}
    ports:
      - "3306:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - app_network_dev
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:20-alpine
    container_name: tacacasas_backend_dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=tacacasas_user
      - DB_PASSWORD=${DB_PASSWORD:-tacacasas_pwd}
      - DB_NAME=${DB_NAME:-taca_das_casas}
      - JWT_SECRET=${JWT_SECRET:-taca_das_casas_secret_key_2024}
      - PORT=3001
    command: sh -c "npm install && npm run dev"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network_dev

  frontend:
    image: node:20-alpine
    container_name: tacacasas_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3001
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - app_network_dev

networks:
  app_network_dev:
    driver: bridge

volumes:
  db_data_dev:
  backend_node_modules:
  frontend_node_modules:
