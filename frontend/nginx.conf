# ============================================================
# nginx.conf
# Configuração crítica para Single Page Applications (SPA).
# Sem isso, ao acessar /login diretamente o Nginx retorna 404
# porque não existe um arquivo físico chamado "login".
# Com "try_files", o Nginx sempre serve o index.html e deixa
# o React Router cuidar do roteamento no lado do cliente.
# ============================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    
    # Permite uploads de até 10MB (o padrão é 1MB e estava causando erro 413)
    client_max_body_size 10M;

    # Compressão gzip para arquivos estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Arquivos estáticos com cache longo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para a API do backend (^~ impede que a regra de arquivos estáticos intercepte)
    location ^~ /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — ESSENCIAL para o React Router funcionar
    location / {
        try_files $uri $uri/ /index.html;
    }
}