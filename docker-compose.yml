services:
  database:
    image: mariadb:10.11
    container_name: tacacasas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-taca_das_casas}
      MYSQL_USER: tacacasas_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-tacacasas_pwd}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tacacasas_backend
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=tacacasas_user
      - DB_PASSWORD=${DB_PASSWORD:-tacacasas_pwd}
      - DB_NAME=${DB_NAME:-taca_das_casas}
      - JWT_SECRET=${JWT_SECRET:-taca_das_casas_secret_key_2024}
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tacacasas_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
