
services:
  database:
    image: mariadb:10.11
    container_name: tacacasas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-tacacasas}
      MYSQL_USER: ${DB_USER:-tacacasas_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tacacasas_pwd}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tacacasas_backend
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - DB_USER=${DB_USER:-tacacasas_user}
      - DB_PASSWORD=${DB_PASSWORD:-tacacasas_pwd}
      - DB_NAME=${DB_NAME:-tacacasas}
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - database
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tacacasas_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
