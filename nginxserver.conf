# 1. Este bloco pega quem digita apenas http:// e joga pro https://
server {
    listen 80;
    server_name tacadascasas.duckdns.org;
    return 301 https://$host$request_uri;
}

# 2. O bloco principal, com o cadeado seguro (porta 443)
server {
    listen 443 ssl;
    server_name tacadascasas.duckdns.org;

    # Caminhos padrão do Certbot (verifique se são esses mesmos no seu servidor)
    ssl_certificate /etc/letsencrypt/live/tacadascasas.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tacadascasas.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --------- A PARTIR DAQUI É TUDO IGUAL AO OUTRO ---------
    root /var/www/tacadascasas/frontend/dist;
    index index.html;
    
    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}